name: Scrape Gudoball

on:
  schedule:
    # 11:45 Asia/Bangkok (UTC+7) => 04:45 UTC
    - cron: "45 4 * * *"
    # 16:15 Asia/Bangkok (UTC+7) => 09:15 UTC
    - cron: "15 9 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scripts/run_scrape.py

      - name: Commit and push data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json
          git diff --cached --quiet || git commit -m "chore: update gudoball latest data"
          git push
